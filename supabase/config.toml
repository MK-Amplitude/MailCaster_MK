[functions.resolve-company]
verify_jwt = false

[functions.resolve-pending-companies]
# pg_cron 이 Bearer <CRON_SECRET> 으로 자체 인증하므로 jwt 검증은 끈다.
verify_jwt = false

[functions.refresh-google-token]
verify_jwt = false

[functions.send-scheduled-campaigns]
# pg_cron 이 Bearer <CRON_SECRET> 으로 자체 인증하므로 jwt 검증은 끈다.
verify_jwt = false

[functions.check-replies]
# pg_cron 이 Bearer <CRON_SECRET> 으로 자체 인증하므로 jwt 검증은 끈다.
verify_jwt = false

[functions.classify-existing-replies]
# 사용자 JWT 와 CRON_SECRET 두 경로 모두 함수 내부에서 자체 검증.
verify_jwt = false

[functions.sync-google-contacts]
# 사용자 JWT (Settings 의 '지금 동기화') 와 CRON_SECRET 두 경로 자체 검증.
verify_jwt = false

[functions.track-open]
# 이메일 클라이언트의 단순 GET 픽셀 요청이므로 jwt 검증 불가.
verify_jwt = false

[functions.check-inbox]
# pg_cron 이 Bearer <CRON_SECRET> 으로 자체 인증하므로 jwt 검증은 끈다.
# (없으면 CRON_SECRET 이 유효 JWT 가 아니라 gateway 가 401 → inbound 폴링 cron 전체 미동작)
verify_jwt = false

[functions.process-sequences]
# pg_cron 이 Bearer <CRON_SECRET> 으로 자체 인증. (시퀀스 자동 후속 발송 스케줄러)
verify_jwt = false
